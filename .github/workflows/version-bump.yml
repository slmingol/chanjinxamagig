name: Auto Version Bump

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip version]')"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Read current version
        id: current_version
        run: |
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"
      
      - name: Bump version
        id: bump
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.version }}"
          
          # Parse version
          IFS='.' read -r -a VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR="${VERSION_PARTS[0]}"
          MINOR="${VERSION_PARTS[1]}"
          PATCH="${VERSION_PARTS[2]}"
          
          # Determine bump type
          BUMP_TYPE="${{ github.event.inputs.version_type }}"
          if [ -z "$BUMP_TYPE" ]; then
            BUMP_TYPE="patch"
          fi
          
          # Increment version
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
      
      - name: Update VERSION file
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > VERSION
      
      - name: Update index.html
        run: |
          sed -i "s/<div class=\"version-number\">v[0-9]\+\.[0-9]\+\.[0-9]\+<\/div>/<div class=\"version-number\">v${{ steps.bump.outputs.new_version }}<\/div>/" index.html
      
      - name: Update README.md badge
        run: |
          if grep -q "Version-v" README.md; then
            sed -i "s/Version-v[0-9]\+\.[0-9]\+\.[0-9]\+/Version-v${{ steps.bump.outputs.new_version }}/" README.md
          fi
      
      - name: Commit and push changes
        run: |
          git add VERSION index.html README.md
          git commit -m "chore: bump version to v${{ steps.bump.outputs.new_version }} [skip version]" || exit 0
          git push
      
      - name: Create Git tag
        run: |
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"
